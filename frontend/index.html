<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Gestión de Tareas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📋 Task Manager</h1>
                <p class="subtitle">Gestiona tus tareas de forma eficiente</p>
            </div>
        </header>

        <!-- Stats -->
        <section class="stats" id="stats">
            <div class="stat-card">
                <span class="stat-number" id="stat-total">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card stat-pending">
                <span class="stat-number" id="stat-pending">0</span>
                <span class="stat-label">Pendientes</span>
            </div>
            <div class="stat-card stat-completed">
                <span class="stat-number" id="stat-completed">0</span>
                <span class="stat-label">Completadas</span>
            </div>
            <div class="stat-card stat-rate">
                <span class="stat-number" id="stat-rate">0%</span>
                <span class="stat-label">Progreso</span>
            </div>
        </section>

        <!-- Form -->
        <section class="add-task-section">
            <form id="task-form" class="task-form">
                <div class="form-group">
                    <input
                        type="text"
                        id="task-title"
                        placeholder="¿Qué necesitas hacer?"
                        autocomplete="off"
                        required
                    >
                    <input
                        type="text"
                        id="task-description"
                        placeholder="Descripción (opcional)"
                        autocomplete="off"
                    >
                </div>
                <button type="submit" class="btn-add">Agregar Tarea</button>
            </form>
        </section>

        <!-- Filter -->
        <section class="filter-section">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Completadas</button>
        </section>

        <!-- Task List -->
        <section class="task-list-section">
            <ul id="task-list" class="task-list">
                <!-- Las tareas se insertan aquí dinámicamente -->
            </ul>
            <div id="empty-state" class="empty-state" style="display: none;">
                <p>No hay tareas en esta categoría.</p>
                <small>Agrega una tarea usando el formulario de arriba.</small>
            </div>
        </section>

        <!-- Toast -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
